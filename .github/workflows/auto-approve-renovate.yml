name: Auto approve Renovate PRs

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Approve PR
        uses: hmarr/auto-approve-action@3cbcf8300c56a4c8c5431e35a5a1183d1f11d7b2 # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
